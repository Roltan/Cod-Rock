openapi: 3.0.3
info:
  title: API системы доставки товаров
  description: |
    REST API для платформы доставки товаров с логистикой и маршрутизацией.

    ## Роли пользователей
    - **user** — покупатель (может просматривать товары, добавлять в корзину, оформлять заказы)
    - **producer** — продавец (может управлять товарами, складами и пунктами выдачи)

    ## Авторизация
    Используется JWT токен в заголовке: `Authorization: Bearer <token>`

    ## Коды ошибок
    - `errCode: 1` — нехватает данных в запросе
    - `errCode: 2` — неверный логин/пароль или недостаточно прав
    - `errCode: 3` — сущность не найдена
    - `errCode: 4` — конфликт (уже существует)
    - `errCode: 5` — не найден маршрут или сущность
    - `errCode: 6` — попытка изменить чужой ресурс
  version: 1.0.0
  contact:
    name: Ролан

servers:
  - url: http://localhost:3001
    description: Development сервер

tags:
  - name: Авторизация
    description: Регистрация, вход и выход из системы
  - name: Товары
    description: Просмотр и управление товарами
  - name: Корзина и заказы
    description: Корзина пользователя и оформление заказов
  - name: Логистика
    description: ПВЗ, склады и расчет маршрутов доставки
  - name: Панель производителя
    description: CRUD операции для производителей (товары, склады, ПВЗ)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "ivan_petrov"
        role:
          type: string
          enum: [user, producer]
          example: "user"

    Stuff:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Кроссовки Nike Air Max"
        photo:
          type: string
          example: "/img/stuff/nike_air_max.jpg"
        price:
          type: integer
          description: Цена в рублях
          example: 5990
        size:
          type: string
          example: "42"
        mass:
          type: integer
          description: Масса в граммах
          example: 800
        description:
          type: string
          example: "Удобные кроссовки для бега"
        producer:
          type: integer
          description: ID производителя
          example: 5

    PVZ:
      type: object
      properties:
        id:
          type: integer
          example: 1
        producer:
          type: integer
          example: 5
        city:
          type: string
          example: "Москва"
        address:
          type: string
          example: "ул. Ленина, 10"
        time_from:
          type: integer
          description: Время доставки от ПВЗ до склада (минуты)
          example: 30
        price_from:
          type: integer
          description: Стоимость доставки от ПВЗ (рубли)
          example: 200
        distance_from:
          type: integer
          description: Расстояние от ПВЗ до склада (км)
          example: 15

    Storehouse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        producer:
          type: integer
          example: 5
        city:
          type: string
          example: "Санкт-Петербург"

    Way:
      type: object
      properties:
        pvz:
          type: integer
          description: ID пункта выдачи
          example: 1
        storhous:
          type: integer
          description: ID склада (опечатка в оригинале)
          example: 3
        initial_city:
          type: string
          example: "Москва"
        final_city:
          type: string
          example: "Казань"
        wayList:
          type: array
          items:
            type: string
          example: ["Москва", "Нижний Новгород", "Казань"]
        way:
          type: string
          description: Строка ID дорог через пробел
          example: "1 5 12"
        time:
          type: integer
          description: Время доставки (минуты)
          example: 480
        price:
          type: integer
          description: Стоимость доставки (рубли)
          example: 1200
        distance:
          type: integer
          description: Расстояние (км)
          example: 450

    Error:
      type: object
      properties:
        errCode:
          type: integer
        errString:
          type: string

paths:
  # ==================== АВТОРИЗАЦИЯ ====================
  /login:
    post:
      tags:
        - Авторизация
      summary: Вход в систему
      description: Авторизация пользователя или производителя по логину и паролю
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - password
              properties:
                name:
                  type: string
                  example: "ivan_petrov"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: Ошибка авторизации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_data:
                  value:
                    errCode: 1
                    errString: "нехватает данных"
                wrong_credentials:
                  value:
                    errCode: 2
                    errString: "неверный логин"

  /register:
    put:
      tags:
        - Авторизация
      summary: Регистрация нового пользователя
      description: Создание аккаунта для пользователя или производителя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - password
                - role
              properties:
                name:
                  type: string
                  example: "new_user"
                password:
                  type: string
                  example: "password123"
                role:
                  type: string
                  enum: [user, producer]
                  example: "user"
      responses:
        '200':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        '401':
          description: Ошибка регистрации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                user_exists:
                  value:
                    errCode: 4
                    errString: "такой пользователь уже есть"

  /logout:
    post:
      tags:
        - Авторизация
      summary: Выход из системы
      description: Удаление JWT токена
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "logout successful"

  /user:
    get:
      tags:
        - Авторизация
      summary: Получить профиль текущего пользователя
      description: Возвращает информацию о текущем авторизованном пользователе
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==================== ТОВАРЫ ====================
  /galary:
    get:
      tags:
        - Товары
      summary: Получить все товары
      description: Возвращает список всех товаров в системе (галерея для пользователей)
      responses:
        '200':
          description: Список товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Stuff'

  /galaryProducer:
    get:
      tags:
        - Товары
      summary: Получить товары текущего производителя
      description: Возвращает список товаров, принадлежащих авторизованному производителю
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список товаров производителя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Stuff'
        '403':
          description: Доступ запрещен (не производитель)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /addStuff:
    put:
      tags:
        - Товары
      summary: Добавить новый товар
      description: Создание товара производителем (с загрузкой фото)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - price
                - size
                - mass
                - description
                - photo
                - photoName
              properties:
                name:
                  type: string
                  example: "Кроссовки Adidas"
                price:
                  type: integer
                  example: 4500
                size:
                  type: string
                  example: "40"
                mass:
                  type: integer
                  example: 700
                description:
                  type: string
                  example: "Спортивные кроссовки"
                photo:
                  type: string
                  format: binary
                  description: Файл изображения
                photoName:
                  type: string
                  example: "adidas_sport.jpg"
      responses:
        '200':
          description: Товар создан
          content:
            text/plain:
              schema:
                type: string
                example: "создал"
        '401':
          description: Нехватает данных
        '403':
          description: Доступ запрещен (не производитель)

  # ==================== КОРЗИНА И ЗАКАЗЫ ====================
  /cart:
    get:
      tags:
        - Корзина и заказы
      summary: Получить корзину пользователя
      description: Возвращает список товаров в корзине текущего пользователя
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Товары в корзине
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Stuff'
        '403':
          description: Доступ запрещен (производитель не имеет корзины)

  /addToCart:
    put:
      tags:
        - Корзина и заказы
      summary: Добавить товар в корзину
      description: Добавляет товар в корзину пользователя по ID или названию
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - stuff
              properties:
                stuff:
                  oneOf:
                    - type: integer
                      example: 5
                    - type: string
                      example: "Кроссовки Nike"
      responses:
        '200':
          description: Товар добавлен
          content:
            text/plain:
              schema:
                type: string
                example: "добавил"
        '401':
          description: Нехватает данных
        '403':
          description: Доступ запрещен (производитель)

  /acceptOrder:
    post:
      tags:
        - Корзина и заказы
      summary: Подтвердить заказ
      description: |
        Оформление заказа с выбранным маршрутом доставки.

        **Порядок действий:**
        1. Пользователь добавляет товары в корзину через `/addToCart`
        2. Выбирает ПВЗ и получает маршруты через `/getWay`
        3. Подтверждает заказ с выбранным маршрутом через `/acceptOrder`
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - pvz
                - storehouse
                - initial_city
                - final_city
                - way
              properties:
                id:
                  type: integer
                  description: ID товара
                  example: 5
                pvz:
                  type: integer
                  description: ID пункта выдачи
                  example: 1
                storehouse:
                  type: integer
                  description: ID склада
                  example: 3
                initial_city:
                  type: string
                  example: "Москва"
                final_city:
                  type: string
                  example: "Казань"
                way:
                  type: string
                  description: Строка ID дорог через пробел (из ответа /getWay)
                  example: "1 5 12"
      responses:
        '200':
          description: Заказ подтвержден
          content:
            text/plain:
              schema:
                type: string
                example: "запомнил"
        '401':
          description: Нехватает данных
        '403':
          description: Доступ запрещен

  # ==================== ЛОГИСТИКА ====================
  /pvz/{producer}:
    get:
      tags:
        - Логистика
      summary: Получить ПВЗ производителя
      description: Возвращает список пунктов выдачи заказов конкретного производителя
      parameters:
        - name: producer
          in: path
          required: true
          schema:
            type: integer
          description: ID производителя
      responses:
        '200':
          description: Список ПВЗ
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    producer:
                      type: integer
                    city:
                      type: string
                    address:
                      type: string

  /pvz/Producer:
    get:
      tags:
        - Логистика
      summary: Получить ПВЗ текущего производителя
      description: Возвращает полный список ПВЗ авторизованного производителя (с метриками доставки)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список ПВЗ с метриками
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PVZ'
        '403':
          description: Доступ запрещен (не производитель)

  /Storehouse/Producer:
    get:
      tags:
        - Логистика
      summary: Получить склады текущего производителя
      description: Возвращает список складов авторизованного производителя
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список складов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Storehouse'
        '403':
          description: Доступ запрещен (не производитель)

  /getWay:
    post:
      tags:
        - Логистика
      summary: Рассчитать маршруты доставки
      description: |
        Поиск оптимальных маршрутов от ПВЗ до складов производителя с учетом типов транспорта.

        **Алгоритм:**
        - Строит граф путей между городами
        - Фильтрует по доступным типам транспорта (car/air/ship)
        - Возвращает топ-3 маршрута по: минимальному времени, минимальной цене, минимальному расстоянию

        **Примечание:** Если маршрут не найден за 4 итерации, делает до 10 дополнительных попыток
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pvz
              properties:
                pvz:
                  type: integer
                  description: ID пункта выдачи
                  example: 1
                car:
                  type: boolean
                  description: Разрешить автотранспорт (по умолчанию true)
                  example: true
                air:
                  type: boolean
                  description: Разрешить авиатранспорт (по умолчанию true)
                  example: false
                ship:
                  type: boolean
                  description: Разрешить морской транспорт (по умолчанию true)
                  example: true
      responses:
        '200':
          description: Найденные маршруты
          content:
            application/json:
              schema:
                type: object
                properties:
                  minTime:
                    type: array
                    description: Топ-3 маршрута по минимальному времени
                    items:
                      $ref: '#/components/schemas/Way'
                  minPrice:
                    type: array
                    description: Топ-3 маршрута по минимальной цене
                    items:
                      $ref: '#/components/schemas/Way'
                  minDistance:
                    type: array
                    description: Топ-3 маршрута по минимальному расстоянию
                    items:
                      $ref: '#/components/schemas/Way'
        '401':
          description: Нехватает данных
        '403':
          description: Доступ запрещен (производитель)
        '404':
          description: Маршрут не найден
          content:
            application/json:
              schema:
                type: object
                properties:
                  err:
                    type: integer
                    example: 5
                  errString:
                    type: string
                    example: "у нас не получилось найти для вас маршрут"

  # ==================== ПАНЕЛЬ ПРОИЗВОДИТЕЛЯ ====================
  /addPVZ:
    put:
      tags:
        - Панель производителя
      summary: Добавить пункт выдачи
      description: Создание нового ПВЗ производителем
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address
                - city
                - time_from
                - price_from
                - distance_from
              properties:
                address:
                  type: string
                  example: "ул. Пушкина, 15"
                city:
                  type: string
                  example: "Екатеринбург"
                time_from:
                  type: integer
                  description: Время доставки от ПВЗ (минуты)
                  example: 45
                price_from:
                  type: integer
                  description: Стоимость доставки от ПВЗ (рубли)
                  example: 150
                distance_from:
                  type: integer
                  description: Расстояние от ПВЗ до склада (км)
                  example: 20
      responses:
        '200':
          description: ПВЗ создан
          content:
            text/plain:
              schema:
                type: string
                example: "создал"
        '401':
          description: Нехватает данных или ПВЗ уже существует
        '403':
          description: Доступ запрещен (не производитель)

  /addStorehouse:
    put:
      tags:
        - Панель производителя
      summary: Добавить склад
      description: Создание нового склада производителем
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - city
              properties:
                city:
                  type: string
                  example: "Новосибирск"
      responses:
        '200':
          description: Склад создан
          content:
            text/plain:
              schema:
                type: string
                example: "создал"
        '401':
          description: Нехватает данных или склад уже существует в этом городе
        '403':
          description: Доступ запрещен (не производитель)

  /Producer/patch/Stuff/{stuff}:
    patch:
      tags:
        - Панель производителя
      summary: Обновить товар
      description: |
        Частичное обновление товара (можно передать только те поля, которые нужно изменить).
        Принимает ID или название товара в URL.
      security:
        - BearerAuth: []
      parameters:
        - name: stuff
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
          description: ID или название товара
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                price:
                  type: integer
                size:
                  type: string
                mass:
                  type: integer
                description:
                  type: string
                photo:
                  type: string
                  format: binary
                photoName:
                  type: string
      responses:
        '200':
          description: Товар обновлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  responce:
                    type: string
                    example: "изменил имя, цену"
        '403':
          description: Доступ запрещен (не производитель или чужой товар)
        '404':
          description: Товар не найден

  /Producer/del/Stuff/{stuff}:
    delete:
      tags:
        - Панель производителя
      summary: Удалить товар
      description: Удаление товара производителем (ID или название в URL)
      security:
        - BearerAuth: []
      parameters:
        - name: stuff
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      responses:
        '200':
          description: Товар удален
          content:
            text/plain:
              schema:
                type: string
                example: "убрал"
        '403':
          description: Доступ запрещен (не производитель или чужой товар)
        '404':
          description: Товар не найден

  /Producer/patch/PVZ/{pvz}:
    patch:
      tags:
        - Панель производителя
      summary: Обновить ПВЗ
      description: Частичное обновление пункта выдачи (ID или адрес в URL)
      security:
        - BearerAuth: []
      parameters:
        - name: pvz
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                city:
                  type: string
                address:
                  type: string
                time_from:
                  type: integer
                price_from:
                  type: integer
                distance_from:
                  type: integer
      responses:
        '200':
          description: ПВЗ обновлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  responce:
                    type: string
        '403':
          description: Доступ запрещен
        '404':
          description: ПВЗ не найден

  /Producer/del/PVZ/{pvz}:
    delete:
      tags:
        - Панель производителя
      summary: Удалить ПВЗ
      description: Удаление пункта выдачи (ID или адрес в URL)
      security:
        - BearerAuth: []
      parameters:
        - name: pvz
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
              - type: string
      responses:
